name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-web
          flutter pub get
          flutter build web --release

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ventio_deploy_key
          chmod 600 ~/.ssh/ventio_deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_WEB_DIR: ${{ secrets.VPS_WEB_DIR }}
        run: |
          set -euo pipefail
          api_items=(api server_api package.json scripts)
          if [ -f package-lock.json ]; then
            api_items+=(package-lock.json)
          fi
          ssh -i ~/.ssh/ventio_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR' '$VPS_WEB_DIR'"
          rsync -az --delete -e "ssh -i ~/.ssh/ventio_deploy_key -p ${VPS_PORT:-22}" \
            "${api_items[@]}" \
            "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"
          rsync -az --delete -e "ssh -i ~/.ssh/ventio_deploy_key -p ${VPS_PORT:-22}" \
            build/web/ \
            "$VPS_USER@$VPS_HOST:$VPS_WEB_DIR/"

      - name: Restart API
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
          VPS_HEALTH_TOKEN: ${{ secrets.VPS_HEALTH_TOKEN }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ventio_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' VPS_HEALTH_URL='$VPS_HEALTH_URL' VPS_HEALTH_TOKEN='$VPS_HEALTH_TOKEN' bash -s" <<'DEPLOY'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

          pm2 restart ventio-api --update-env
          pm2 save

          if [ -n "${VPS_HEALTH_URL:-}" ]; then
            if [ -n "${VPS_HEALTH_TOKEN:-}" ]; then
              curl -fsS -H "Authorization: Bearer $VPS_HEALTH_TOKEN" "$VPS_HEALTH_URL" >/dev/null
            else
              curl -fsS "$VPS_HEALTH_URL" >/dev/null
            fi
          fi
          DEPLOY
