name: ventio
description: Ventio offline-first merchant and marketplace management app.
publish_to: 'none'
version: 1.0.14+14
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  audioplayers: ^6.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.0
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.26
  pdf: ^3.11.1
  printing: ^5.14.2
  file_picker: ^8.1.2
  crypto: ^3.0.6
  archive: ^4.0.9
  pointycastle: ^3.9.1
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/sounds/
    - assets/fonts/
    - assets/branding/
